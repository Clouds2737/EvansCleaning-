<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Book an Appointment</h1>
  <div>
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='login.html'">Owner Login</button>
  </div>
</header>

<div class="card">
  <input type="text" id="name" placeholder="Your Name">
  <input type="email" id="email" placeholder="Your Email">
  <input type="date" id="date" placeholder="Date of Appointment">
  <input type="text" id="service" placeholder="Service">
  <input type="text" id="address" placeholder="Address">
  <input type="text" id="phone" placeholder="Phone Number">
  <button id="bookBtn">Book Appointment</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const supabase = createClient(
  'https://okomdlybpmmpggyneluz.supabase.co',
  'sb_publishable_culL2kwxVZ9dj7n71iKYlQ_Znn_BIgF'
)

document.getElementById("bookBtn").addEventListener("click", async () => {
  const name = document.getElementById("name").value
  const email = document.getElementById("email").value
  const date = document.getElementById("date").value
  const service = document.getElementById("service").value
  const address = document.getElementById("address").value
  const phone = document.getElementById("phone").value

  if (!name || !email || !date || !service || !address || !phone) {
    alert("Please fill in all fields")
    return
  }

  const { data, error } = await supabase
    .from('appointments')
    .insert([{
      name,
      email,
      date,
      service,
      address,
      phone
    }])

  if (error) {
    console.error("Error booking appointment:", error)
    alert("Error booking appointment. Check console.")
  } else {
    alert("Appointment booked successfully!")
    // Clear fields
    document.getElementById("name").value = ""
    document.getElementById("email").value = ""
    document.getElementById("date").value = ""
    document.getElementById("service").value = ""
    document.getElementById("address").value = ""
    document.getElementById("phone").value = ""
  }
})
</script>

</body>
</html>
